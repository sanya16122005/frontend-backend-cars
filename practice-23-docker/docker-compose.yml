services:
  cars-backend-1:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=cars-backend-1
    networks:
      - cars-net

  cars-backend-2:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=cars-backend-2
    networks:
      - cars-net

  cars-backend-3:
    build: ./backend
    environment:
      - PORT=3000
      - SERVER_ID=cars-backend-3
    networks:
      - cars-net

  nginx:
    image: nginx:alpine
    depends_on:
      - cars-backend-1
      - cars-backend-2
      - cars-backend-3
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cars-net

networks:
  cars-net:
    driver: bridge
