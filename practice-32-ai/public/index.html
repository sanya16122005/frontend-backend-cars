<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🤖 AI Chat (RAG)</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="header">
    <h1>🤖 AI Chat</h1>
    <div class="docs">
      <button id="upload-btn">📎 Загрузить документ</button>
      <input id="upload-input" type="file" accept=".txt,.md" hidden />
      <span id="docs-info">Документы: 0</span>
    </div>
  </header>

  <main id="chat"></main>

  <form id="form" autocomplete="off">
    <input id="message" placeholder="Спросите что-нибудь…" required />
    <button>Отправить</button>
  </form>

  <script src="/app.js"></script>
</body>
</html>
