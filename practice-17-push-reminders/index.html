<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0b0f19">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Авто-задачи">
  <link rel="icon" href="/icons/favicon-32x32.png" type="image/png">

  <title>🚗 Авто-задачи — Напоминания</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="brand">🚗 Авто-задачи</h1>
      <span id="status" class="status"></span>
    </header>

    <nav class="tabs">
      <button id="tab-home" class="tab tab--active" data-page="home">Главная</button>
      <button id="tab-about" class="tab" data-page="about">О приложении</button>
    </nav>

    <main id="app-content" class="main">
      <p class="empty">Загрузка…</p>
    </main>

    <footer class="footer">
      <button id="enable-push" class="btn btn--primary">🔔 Включить уведомления</button>
      <button id="disable-push" class="btn btn--danger" style="display:none">🔕 Отключить уведомления</button>
    </footer>
  </div>

  <div id="toast-host"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
