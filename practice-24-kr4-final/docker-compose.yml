services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cars_db
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks: [cars-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cars_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    networks: [cars-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Одноразовая инициализация БД (создание таблиц + seed).
  # Этот сервис ЕДИНСТВЕННЫЙ собирает образ — остальные backend-сервисы
  # переиспользуют image: cars-backend:latest, чтобы не пересобирать 4 раза.
  init-db:
    build: ./backend
    image: cars-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: cars_db
      PGPORT: 5432
    command: ["node", "src/init-db.js"]
    networks: [cars-net]
    restart: "no"

  cars-backend-1:
    image: cars-backend:latest
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      init-db:  { condition: service_completed_successfully }
    environment:
      PORT: 3000
      SERVER_ID: cars-backend-1
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: cars_db
      PGPORT: 5432
      REDIS_URL: redis://redis:6379
      ACCESS_SECRET:  cars_access_secret
      REFRESH_SECRET: cars_refresh_secret
      VAPID_PUBLIC:  ${VAPID_PUBLIC:-BNxRsl7y0n9wWQ8sZK2Q1Xz0WyYC0HwQ8Hh8aE7q3qSxKxRk5q6Xc9Vy2KxJh8Pk9aLn0_RbF8t8sP2gQ4cU0w7E}
      VAPID_PRIVATE: ${VAPID_PRIVATE:-CHANGE_ME_PRIVATE_KEY_FROM_npm_run_vapid}
    networks: [cars-net]

  cars-backend-2:
    image: cars-backend:latest
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      init-db:  { condition: service_completed_successfully }
    environment:
      PORT: 3000
      SERVER_ID: cars-backend-2
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: cars_db
      PGPORT: 5432
      REDIS_URL: redis://redis:6379
      ACCESS_SECRET:  cars_access_secret
      REFRESH_SECRET: cars_refresh_secret
      VAPID_PUBLIC:  ${VAPID_PUBLIC:-BNxRsl7y0n9wWQ8sZK2Q1Xz0WyYC0HwQ8Hh8aE7q3qSxKxRk5q6Xc9Vy2KxJh8Pk9aLn0_RbF8t8sP2gQ4cU0w7E}
      VAPID_PRIVATE: ${VAPID_PRIVATE:-CHANGE_ME_PRIVATE_KEY_FROM_npm_run_vapid}
    networks: [cars-net]

  cars-backend-3:
    image: cars-backend:latest
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      init-db:  { condition: service_completed_successfully }
    environment:
      PORT: 3000
      SERVER_ID: cars-backend-3
      PGHOST: postgres
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: cars_db
      PGPORT: 5432
      REDIS_URL: redis://redis:6379
      ACCESS_SECRET:  cars_access_secret
      REFRESH_SECRET: cars_refresh_secret
      VAPID_PUBLIC:  ${VAPID_PUBLIC:-BNxRsl7y0n9wWQ8sZK2Q1Xz0WyYC0HwQ8Hh8aE7q3qSxKxRk5q6Xc9Vy2KxJh8Pk9aLn0_RbF8t8sP2gQ4cU0w7E}
      VAPID_PRIVATE: ${VAPID_PRIVATE:-CHANGE_ME_PRIVATE_KEY_FROM_npm_run_vapid}
    networks: [cars-net]

  # Единый Nginx: отдаёт собранный фронт + проксирует /api, /api-docs, /socket.io
  frontend:
    build: ./frontend
    depends_on:
      - cars-backend-1
      - cars-backend-2
      - cars-backend-3
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [cars-net]

networks:
  cars-net:
    driver: bridge

volumes:
  pg-data:
