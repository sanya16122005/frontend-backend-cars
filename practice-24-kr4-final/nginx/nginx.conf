events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Балансировка трёх backend-инстансов
    upstream cars_backend {
        server cars-backend-1:3000 max_fails=2 fail_timeout=30s;
        server cars-backend-2:3000 max_fails=2 fail_timeout=30s;
        server cars-backend-3:3000 backup;
    }

    server {
        listen 80;
        root  /usr/share/nginx/html;
        index index.html;

        # ── API → backend (Round Robin между 3 инстансами) ──
        location /api/ {
            proxy_pass http://cars_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Swagger UI ──
        location /api-docs {
            proxy_pass http://cars_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Socket.IO (WebSocket upgrade) ──
        location /socket.io/ {
            proxy_pass http://cars_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Service Worker / manifest — без кэша браузера ──
        location = /sw.js {
            add_header Cache-Control "no-store";
            try_files $uri =404;
        }
        location = /manifest.json {
            add_header Cache-Control "no-store";
            try_files $uri =404;
        }

        # ── React SPA: всё, что не статика — отдаём index.html ──
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
