<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Web App Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Цвет темы -->
  <meta name="theme-color" content="#0b0f19">

  <!-- Android -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Авто-задачи">

  <!-- Фавиконка -->
  <link rel="icon" href="/icons/favicon-32x32.png" type="image/png">

  <title>🚗 Задачи — Автомобили</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="brand">🚗 Список задач</h1>
      <span id="status" class="status"></span>
    </header>

    <main class="main">
      <form id="note-form" class="form">
        <input
          id="note-input"
          class="input"
          type="text"
          placeholder="Введите задачу..."
          required
        />
        <button type="submit" class="btn btn--primary">+ Добавить</button>
      </form>

      <ul id="notes-list" class="list"></ul>
      <p id="empty" class="empty" style="display:none">Задач пока нет</p>
    </main>

    <footer class="footer">
      <p>🚗 Cars Tasks — PWA, работает офлайн</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
